<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilibili 音频播放器</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Microsoft YaHei', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #fff4f8 0, #f4f5f7 180px);
      color: #212121;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, #fb7299, #f15d8b);
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 3px 12px rgba(251, 114, 153, 0.24);
      flex: 0 0 auto;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 64%;
    }
    .controls {
      display: flex;
      align-items: center;
    }
    .player-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .video-info {
      margin-bottom: 12px;
      padding: 14px;
      border: 1px solid #f0e2e8;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 6px 18px rgba(33, 33, 33, 0.05);
    }
    .video-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-id {
      font-size: 12px;
      color: #666;
    }
    .player-option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: #555;
    }
    .player-option-row select {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 7px;
      background: #fff;
      color: #333;
    }
    .episode-control {
      display: none;
      position: relative;
      z-index: 20;
      flex-direction: column;
      gap: 0;
      margin-top: 10px;
    }
    .episode-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e7d6dd;
      border-radius: 8px;
      background: #fff;
      color: #333;
      cursor: pointer;
      text-align: left;
      font: inherit;
    }
    .episode-toggle:hover:not(:disabled) {
      border-color: #fb7299;
    }
    .episode-toggle:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .episode-toggle-label {
      flex: 0 0 auto;
      color: #888;
      font-size: 12px;
    }
    .episode-current {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      color: #333;
    }
    .episode-toggle-chevron {
      flex: 0 0 auto;
      color: #999;
      font-size: 12px;
      transition: transform 0.15s ease;
    }
    .episode-control.is-open .episode-toggle-chevron {
      transform: rotate(180deg);
    }
    .episode-control.is-open .episode-toggle {
      border-color: #fb7299;
      box-shadow: 0 0 0 1px rgba(251, 114, 153, 0.12);
    }
    .episode-panel {
      display: none;
      position: fixed;
      z-index: 1000;
      max-height: min(280px, 45vh);
      overflow: auto;
      border: 1px solid #f0c2d1;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(33, 33, 33, 0.16), 0 2px 8px rgba(251, 114, 153, 0.12);
    }
    .episode-panel.is-open {
      display: block;
    }
    .episode-list {
      list-style: none;
      margin: 0;
      padding: 4px 0;
    }
    .episode-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      border: none;
      background: transparent;
      color: #333;
      cursor: pointer;
      text-align: left;
      font: inherit;
      line-height: 1.35;
    }
    .episode-item:hover,
    .episode-item:focus-visible {
      background: #fff1f5;
      outline: none;
    }
    .episode-item.is-active {
      background: #ffe4ed;
      color: #d94877;
      font-weight: 600;
    }
    .episode-item-index {
      flex: 0 0 auto;
      min-width: 2.2em;
      color: #999;
      font-size: 12px;
    }
    .episode-item.is-active .episode-item-index {
      color: #fb7299;
    }
    .episode-item-title {
      flex: 1;
      min-width: 0;
      white-space: normal;
      word-break: break-word;
      font-size: 13px;
    }
    .playback-options {
      justify-content: flex-end;
      margin: 0 0 12px;
      padding: 10px 12px;
      border: 1px solid #ececef;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
    }
    .playback-options select {
      flex: 0 0 auto;
      width: 96px;
    }
    .speed-step {
      width: 30px;
      height: 30px;
      padding: 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      color: #333;
      cursor: pointer;
      font-size: 18px;
      line-height: 28px;
    }
    .speed-step:hover:not(:disabled) {
      border-color: #fb7299;
      color: #fb7299;
    }
    .speed-step:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .audio-player {
      display: none;
    }
    .transport-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 12px 8px;
      border: 1px solid #ececef;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 5px 16px rgba(33, 33, 33, 0.04);
    }
    .transport-btn {
      min-width: 58px;
      height: 34px;
      padding: 0 8px;
      border: 1px solid #ddd;
      border-radius: 17px;
      background: #fff;
      color: #555;
      cursor: pointer;
      font-size: 12px;
    }
    .transport-btn:hover:not(:disabled) {
      border-color: #fb7299;
      color: #fb7299;
    }
    .transport-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .custom-controls {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      padding: 12px;
      border: 1px solid #ececef;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
    }
    .play-pause {
      background-color: #fb7299;
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .play-pause:hover {
      background-color: #e45f8a;
    }
    .play-pause i {
      font-size: 18px;
    }
    .time-display {
      font-size: 12px;
      color: #666;
      margin-left: 10px;
      white-space: nowrap;
    }
    .progress-container {
      flex: 1;
      height: 8px;
      background-color: #ddd;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      background-color: #fb7299;
      border-radius: 3px;
      width: 0;
      transition: width 0.1s linear;
    }
    .volume-container {
      display: flex;
      align-items: center;
      margin-left: 12px;
    }
    .volume-icon {
      margin-right: 7px;
      cursor: pointer;
      font-size: 18px;
      color: #666;
    }
    .volume-slider {
      width: 52px;
      height: 6px;
      background-color: #ddd;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    .volume-level {
      height: 100%;
      background-color: #fb7299;
      border-radius: 3px;
      width: 100%;
    }
    .icon-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 18px;
      padding: 5px;
      margin-left: 10px;
    }
    .icon-btn:hover {
      opacity: 0.8;
    }
    
    /* Icons using Unicode characters */
    .icon-play:after { content: "▶"; }
    .icon-pause:after { content: "⏸"; }
    .icon-volume:after { content: "🔊"; }
    .icon-mute:after { content: "🔇"; }
    .icon-settings:after { content: "⚙"; font-size: 22px; }
    .icon-close:after { content: "✖"; }
    
    .icon-btn svg { /* Style for SVGs within icon buttons */
      display: block; /* Ensures proper alignment and sizing */
      width: 18px;    /* Consistent with font-size based icons */
      height: 18px;   /* Consistent with font-size based icons */
    }

    /* Styling for empty/filled star icons */
    .icon-add-to-playlist .icon-star-filled {
      display: none; /* Hidden by default */
    }
    .icon-add-to-playlist .icon-star-empty {
      display: block; /* Shown by default */
    }
    .icon-add-to-playlist.is-favorited .icon-star-filled {
      display: block; /* Shown when button has .is-favorited class */
    }
    .icon-add-to-playlist.is-favorited .icon-star-empty {
      display: none; /* Hidden when button has .is-favorited class */
    }

    /* Status Message Styling */
    .status-message {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 10px;
      display: none; /* Hidden by default, shown by adding .show class */
      text-align: center;
      font-size: 14px;
    }
    .status-message.show {
      display: block;
    }
    .status-message.success {
      background-color: #e6f7e6; /* Light green */
      color: #2e7d32; /* Dark green */
    }
    .status-message.error {
      background-color: #fdecea; /* Light red */
      color: #c62828; /* Dark red */
    }
    .status-message.info {
      background-color: #e7f3fe; /* Light blue */
      color: #1976d2; /* Dark blue */
    }
    /* End Status Message Styling */

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      display: none; /* Hidden by default */
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background-color: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      width: 80%;
      max-width: 350px;
      text-align: left;
    }
    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-top: 0;
      margin-bottom: 15px;
      color: #333;
    }
    .modal-message { /* For confirmation modal */
      font-size: 14px;
      margin-bottom: 20px;
      color: #555;
      line-height: 1.5;
    }
    .modal-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px 0;
      max-height: 150px;
      overflow-y: auto;
    }
    .modal-list-item {
      padding: 10px;
      border: 1px solid #eee;
      border-radius: 4px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }
    .modal-list-item:hover, .modal-list-item.selected {
      background-color: #f0f0f0;
    }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-button {
      padding: 8px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .modal-button.confirm {
      background-color: #fb7299;
      color: white;
    }
    .modal-button.confirm:hover {
      background-color: #e45f8a;
    }
    .modal-button.cancel {
      background-color: #eee;
      color: #333;
    }
    .modal-button.cancel:hover {
      background-color: #ddd;
    }
    /* End Modal Styling */

    .playlist-meta {
        font-size: 0.9em;
        color: #666; /* Adjusted for better visibility on light background */
        margin: 2px 0;
    }
    #playlist-info {
        margin-bottom: 5px;
    }

    .error-message {
      background-color: #fdecea;
      color: #c62828;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    
    /* Responsive adjustments */
    @media (max-width: 360px) {
      .volume-container {
        display: none;
      }
      .transport-controls {
        gap: 4px;
      }
      .transport-btn {
        min-width: 50px;
        padding: 0 5px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title" id="header-title">Bilibili 音频播放器</h1>
    <div class="controls">
      <button class="icon-btn icon-add-to-playlist" id="add-to-playlist-btn" title="添加到播放合集">
        <svg viewBox="0 0 24 24" class="icon-svg icon-star-empty" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg viewBox="0 0 24 24" class="icon-svg icon-star-filled" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27z"/></svg>
      </button>
      <button class="icon-btn icon-settings" id="settings-btn" title="设置"></button>
      <button class="icon-btn icon-close" id="close-btn" title="关闭"></button>
    </div>
  </div>
  
  <div class="player-container">
    <div class="status-message" id="status-message"></div> <!-- Changed from error-message for generic use -->
    
    <div class="video-info">
      <div id="playlist-info" style="display: none;">
        <p id="playlist-name" class="playlist-meta"></p>
        <p id="playlist-track-indicator" class="playlist-meta"></p>
      </div>
      <div class="video-title" id="video-title">加载中...</div>
      <div class="video-id" id="video-id"></div>
      <div class="episode-control" id="episode-control" style="display: none;">
        <button type="button" class="episode-toggle" id="episode-toggle" aria-expanded="false" aria-controls="episode-panel">
          <span class="episode-toggle-label">选集</span>
          <span class="episode-current" id="episode-current">—</span>
          <span class="episode-toggle-chevron" aria-hidden="true">▾</span>
        </button>
        <div class="episode-panel" id="episode-panel" hidden>
          <ul class="episode-list" id="episode-list" role="listbox" aria-label="分集列表"></ul>
        </div>
      </div>
    </div>
    
    <audio id="audio-player" class="audio-player" preload="metadata"></audio>

    <div class="player-option-row playback-options">
      <label for="playback-rate-select">播放速度</label>
      <button class="speed-step" id="playback-rate-down" type="button" aria-label="降低播放速度" title="降低 0.05×">−</button>
      <select id="playback-rate-select" aria-label="播放速度">
        <option value="0.25">0.25×</option>
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1.0×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="1.75">1.75×</option>
        <option value="2">2.0×</option>
        <option value="2.5">2.5×</option>
        <option value="3">3.0×</option>
      </select>
      <button class="speed-step" id="playback-rate-up" type="button" aria-label="提高播放速度" title="提高 0.05×">＋</button>
    </div>
    
    <div class="transport-controls">
      <button id="prev-track-btn" class="transport-btn" type="button">上一集</button>
      <button id="seek-backward-btn" class="transport-btn" type="button" title="后退 10 秒">−10秒</button>
      <button class="play-pause" id="play-pause-btn" type="button" title="播放/暂停（空格）">
        <i class="icon-play" id="play-icon"></i>
      </button>
      <button id="seek-forward-btn" class="transport-btn" type="button" title="前进 10 秒">+10秒</button>
      <button id="next-track-btn" class="transport-btn" type="button">下一集</button>
    </div>

    <div class="custom-controls">
      <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      
      <div class="time-display" id="time-display">00:00 / 00:00</div>
      
      <div class="volume-container">
        <div class="volume-icon icon-volume" id="volume-icon"></div>
        <div class="volume-slider" id="volume-slider">
          <div class="volume-level" id="volume-level"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for Playlist Selection and Confirmation -->
  <div class="modal-overlay" id="custom-modal-overlay">
    <div class="modal-content">
      <h3 class="modal-title" id="modal-title">选择播放合集</h3>
      <p class="modal-message" id="modal-message-text" style="display: none;"></p> <!-- For confirm messages -->
      <ul class="modal-list" id="modal-playlist-list"></ul>
      <div class="modal-buttons">
        <button class="modal-button cancel" id="modal-cancel-btn">取消</button>
        <button class="modal-button confirm" id="modal-confirm-btn">确定</button>
      </div>
    </div>
  </div>

  <script src="player.js"></script>
</body>
</html>
